<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlchoScan — UK Barcode Lookup</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
      --accent: #d4a017; --accent2: #5a2d0c; --text: #e8e4dc;
      --muted: #6b6560; --green: #4caf72; --red: #cf4444;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 20px 16px 48px;
    }
    header { text-align: center; margin-bottom: 20px; }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      letter-spacing: 0.08em; color: var(--accent); line-height: 1;
    }
    .sub { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.25em; text-transform: uppercase; margin-top: 4px; }
    .divider { width: 100%; max-width: 480px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); margin-bottom: 20px; opacity: 0.4; }

    .card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }

    #vc { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; display: none; }
    .corner { position: absolute; width: 26px; height: 26px; border-color: var(--accent); border-style: solid; z-index: 10; }
    .tl { top: 14px; left: 14px; border-width: 2px 0 0 2px; }
    .tr { top: 14px; right: 14px; border-width: 2px 2px 0 0; }
    .bl { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; }
    .br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; }
    #scanline {
      display: none; position: absolute; left: 14px; right: 14px; height: 2px;
      background: rgba(212,160,23,0.8); box-shadow: 0 0 10px 3px rgba(212,160,23,0.4);
      z-index: 9; animation: scan 2s ease-in-out infinite;
    }
    @keyframes scan { 0%,100% { top: 18%; } 50% { top: 78%; } }
    #placeholder { display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--muted); font-size: 0.7rem; letter-spacing: 0.08em; text-align: center; padding: 32px 20px; }
    #placeholder svg { opacity: 0.25; }

    .controls { padding: 12px 14px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
    .btn {
      flex: 1; padding: 11px 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; border-radius: 2px; transition: all 0.15s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent); color: #0d0d0d; border-color: var(--accent); font-weight: 500; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .manual { padding: 0 14px 14px; display: flex; gap: 8px; }
    .manual input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 0.78rem; padding: 9px 11px;
      border-radius: 2px; outline: none; letter-spacing: 0.1em;
    }
    .manual input:focus { border-color: var(--accent); }
    .manual input::placeholder { color: var(--muted); }
    .manual button {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em;
      padding: 9px 12px; border-radius: 2px; cursor: pointer; text-transform: uppercase;
    }
    .manual button:hover { border-color: var(--accent); color: var(--accent); }

    #statusbar { padding: 8px 14px; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; min-height: 34px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.err { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(212,160,23,0.25); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #result { width: 100%; max-width: 480px; margin-top: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; display: none; animation: up 0.3s ease; }
    @keyframes up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .rhead { padding: 10px 14px; background: var(--accent); color: #0d0d0d; font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; letter-spacing: 0.2em; display: flex; align-items: center; gap: 6px; }
    .rhead.err { background: var(--red); color: #fff; }
    .rbody { padding: 16px 14px; }
    .pname { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.3rem, 5vw, 1.9rem); letter-spacing: 0.04em; line-height: 1.15; margin-bottom: 14px; }
    .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mi { display: flex; flex-direction: column; gap: 2px; }
    .ml { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .mv { font-size: 0.75rem; color: var(--text); }
    .tag { display: inline-block; background: var(--accent2); color: var(--accent); font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; }
    .bc { font-size: 1rem; color: var(--accent); letter-spacing: 0.12em; }
    .thumb { float: right; max-width: 72px; max-height: 72px; object-fit: contain; margin: 0 0 10px 12px; border: 1px solid var(--border); border-radius: 2px; }

    #hist { width: 100%; max-width: 480px; margin-top: 20px; display: none; }
    .htitle { font-size: 0.58rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .htitle::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .hi { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 9px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; margin-bottom: 6px; transition: border-color 0.15s; }
    .hi:hover { border-color: var(--accent); }
    .hn { font-size: 0.72rem; color: var(--text); }
    .hb { font-size: 0.58rem; color: var(--muted); }
    .ht { font-size: 0.58rem; color: var(--muted); flex-shrink: 0; }
  </style>
</head>
<body>
  <header>
    <h1>AlchoScan</h1>
    <p class="sub">UK Alcohol Barcode Lookup</p>
  </header>
  <div class="divider"></div>

  <div class="card" id="scanner">
    <div id="vc">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div id="scanline"></div>
      <video id="video" playsinline autoplay muted></video>
      <div id="placeholder">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Tap Start Camera to scan a barcode
      </div>
    </div>

    <div class="controls">
      <button class="btn primary" id="btnStart">Start Camera</button>
      <button class="btn" id="btnStop" disabled>Stop</button>
    </div>

    <div class="manual">
      <input type="text" id="manualInput" inputmode="numeric" placeholder="Or enter barcode manually…" maxlength="14" />
      <button id="btnGo">Go</button>
    </div>

    <div id="statusbar">
      <div class="dot" id="dot"></div>
      <div class="spinner" id="spinner"></div>
      <span id="statusMsg">Ready</span>
    </div>
  </div>

  <div id="result"></div>
  <div id="hist"><div class="htitle">Scan History</div><div id="histList"></div></div>

  <script>
    const video      = document.getElementById('video');
    const placeholder= document.getElementById('placeholder');
    const btnStart   = document.getElementById('btnStart');
    const btnStop    = document.getElementById('btnStop');
    const dot        = document.getElementById('dot');
    const spinner    = document.getElementById('spinner');
    const statusMsg  = document.getElementById('statusMsg');
    const result     = document.getElementById('result');
    const scanline   = document.getElementById('scanline');
    const manualInput= document.getElementById('manualInput');
    const btnGo      = document.getElementById('btnGo');
    const hist       = document.getElementById('hist');
    const histList   = document.getElementById('histList');

    let stream = null, detector = null, rafId = null, scanning = false;
    const history = [];

    function setStatus(msg, state='idle') {
      statusMsg.textContent = msg;
      dot.className = 'dot' + (state==='on' ? ' on' : state==='err' ? ' err' : '');
    }
    function setLoading(on) {
      spinner.style.display = on ? 'block' : 'none';
    }

    async function startCamera() {
      try {
        setStatus('Requesting camera…');
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
        });
        video.srcObject = stream;
        await video.play();
        video.style.display = 'block';
        placeholder.style.display = 'none';
        scanline.style.display = 'block';
        scanning = true;
        btnStart.disabled = true;
        btnStop.disabled = false;

        if ('BarcodeDetector' in window) {
          setStatus('Scanning — point at barcode', 'on');
          detector = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39'] });
          loop();
        } else {
          setStatus('Camera on — BarcodeDetector not available, use manual entry', 'err');
        }
      } catch(e) {
        setStatus('Camera error: ' + (e.message || e), 'err');
      }
    }

    function loop() {
      if (!scanning || !video.srcObject) return;
      if (video.readyState < 2) { rafId = requestAnimationFrame(loop); return; }
      detector.detect(video).then(codes => {
        if (codes.length > 0) {
          stopCamera();
          lookup(codes[0].rawValue);
        } else {
          rafId = requestAnimationFrame(loop);
        }
      }).catch(() => { rafId = requestAnimationFrame(loop); });
    }

    function stopCamera() {
      if (rafId) cancelAnimationFrame(rafId);
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      video.srcObject = null;
      video.style.display = 'none';
      placeholder.style.display = 'flex';
      scanline.style.display = 'none';
      scanning = false;
      btnStart.disabled = false;
      btnStop.disabled = true;
      setStatus('Camera stopped');
    }

    async function lookup(code) {
      const barcode = code.trim().replace(/\D/g,'');
      if (!barcode) { setStatus('Invalid barcode','err'); return; }
      setLoading(true);
      setStatus('Looking up ' + barcode + '…');
      try {
        const res  = await fetch('https://world.openfoodfacts.org/api/v0/product/' + barcode + '.json');
        const data = await res.json();
        if (data.status === 1 && data.product) {
          showResult(barcode, data.product);
          const name = data.product.product_name || data.product.product_name_en || 'Unknown';
          addHistory(barcode, name);
          setStatus('Product found ✓', 'on');
        } else {
          showNotFound(barcode);
          setStatus('Not found in database', 'err');
        }
      } catch(e) {
        showError(barcode);
        setStatus('Network error', 'err');
      }
      setLoading(false);
    }

    function showResult(barcode, p) {
      const name  = p.product_name || p.product_name_en || p.generic_name || 'Unknown Product';
      const brand = p.brands || '—';
      const qty   = p.quantity || '—';
      const abv   = p.nutriments?.alcohol ? p.nutriments.alcohol + '% ABV' : '—';
      const cat   = (p.categories_tags||[])
        .find(t => /alcohol|beer|wine|spirit|cider|lager|whisky|vodka|gin|rum|brandy/i.test(t))
        ?.replace(/^en:/,'').replace(/-/g,' ') || '—';
      const img = p.image_front_small_url || p.image_small_url || null;
      result.style.display = 'block';
      result.innerHTML = `
        <div class="rhead">✓ Product Identified</div>
        <div class="rbody">
          ${img ? `<img src="${img}" class="thumb" onerror="this.remove()">` : ''}
          <div class="pname">${name}</div>
          <div class="meta">
            <div class="mi"><span class="ml">Barcode</span><span class="mv bc">${barcode}</span></div>
            <div class="mi"><span class="ml">Brand</span><span class="mv">${brand}</span></div>
            <div class="mi"><span class="ml">Size</span><span class="mv">${qty}</span></div>
            <div class="mi"><span class="ml">ABV</span><span class="mv">${abv}</span></div>
            <div class="mi"><span class="ml">Category</span><span class="mv"><span class="tag">${cat}</span></span></div>
          </div>
        </div>`;
    }

    function showNotFound(barcode) {
      result.style.display = 'block';
      result.innerHTML = `
        <div class="rhead err">Not Found</div>
        <div class="rbody">
          <div class="pname" style="color:var(--muted)">Barcode ${barcode}</div>
          <p style="font-size:0.72rem;color:var(--muted);line-height:1.6;margin-top:8px">Not in Open Food Facts. May be a regional or newer product.</p>
        </div>`;
    }

    function showError(barcode) {
      result.style.display = 'block';
      result.innerHTML = `
        <div class="rhead err">Error</div>
        <div class="rbody"><div class="pname" style="color:var(--muted);font-size:1rem">Network error — check connection</div></div>`;
    }

    function addHistory(barcode, name) {
      const ts = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      history.unshift({barcode,name,ts});
      if (history.length > 10) history.pop();
      hist.style.display = 'block';
      histList.innerHTML = history.map(h => `
        <div class="hi" onclick="lookup('${h.barcode}')">
          <div><div class="hn">${h.name}</div><div class="hb">${h.barcode}</div></div>
          <div class="ht">${h.ts}</div>
        </div>`).join('');
    }

    // Check support on load
    window.addEventListener('load', () => {
      if (!('mediaDevices' in navigator && 'getUserMedia' in navigator.mediaDevices)) {
        setStatus('Camera not supported in this browser', 'err');
        btnStart.disabled = true;
      } else if (!('BarcodeDetector' in window)) {
        setStatus('Ready — note: auto-scan not supported, use manual entry', 'err');
      }
    });

    btnStart.addEventListener('click', startCamera);
    btnStop.addEventListener('click', stopCamera);
    btnGo.addEventListener('click', () => lookup(manualInput.value));
    manualInput.addEventListener('keydown', e => { if (e.key==='Enter') lookup(manualInput.value); });
  </script>
</body>
</html>
